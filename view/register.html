<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreren - Bubble</title>
    <link rel="stylesheet" href="../assets/styling/home.css">
    <link rel="stylesheet" href="../assets/styling/style.css">
    <link rel="stylesheet" href="../assets/styling/auth.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div id="canvas-container"></div>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Bubble</h1>
                <p>Sluit je aan!</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Gebruikersnaam</label>
                    <input type="text" id="username" name="username" placeholder="jouwgebruikersnaam" required>
                    <span class="error-message" id="username-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="je@email.com" required>
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Wachtwoord</label>
                    <div class="password-input-group">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" id="password-toggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="password-error"></span>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Bevestig wachtwoord</label>
                    <div class="password-input-group">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••"
                            required>
                        <button type="button" class="password-toggle" id="confirm-toggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="confirm-error"></span>
                </div>

                <button type="submit" class="auth-button">Registreren</button>
            </form>

            <div class="auth-footer">
                <p>Heb je al een account? <a href="login.html">Inloggen</a></p>
            </div>
        </div>
    </div>

    <script src="../javascript/surreal-bg.js"></script>
    <script src="../javascript/auth.js"></script>

    <script type="module">
        import { initSurrealBackground } from '../javascript/surreal-bg.js'

        initSurrealBackground('canvas-container')
    </script>
</body>

</html>
